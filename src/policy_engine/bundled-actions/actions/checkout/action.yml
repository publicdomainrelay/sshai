name: Tangled Checkout
description: >
  Fetches the repository from the knot via XRPC instead of GitHub.
  Replaces actions/checkout for use in the tangled spindle environment.
inputs:
  ref:
    description: The commit SHA or ref to check out
    default: ""
  path:
    description: Relative path under workspace to place the repository
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        # set -x

        KNOT="${SPINDLE_KNOT:-}"
        REPO_DID="${SPINDLE_REPO_DID:-}"
        # PE sets INPUT_REF / INPUT_PATH from the `with:` block.
        REF="${INPUT_REF:-${GITHUB_SHA:-}}"
        DEST="${INPUT_PATH:-.}"

        if [ -z "$KNOT" ] || [ -z "$REPO_DID" ] || [ -z "$REF" ]; then
          echo "::error::tangled/checkout: SPINDLE_KNOT, SPINDLE_REPO_DID, and GITHUB_SHA must be set"
          exit 1
        fi

        # Ensure KNOT has https:// prefix
        if [[ ! "$KNOT" =~ ^https?:// ]]; then
          KNOT="https://${KNOT}"
        fi

        mkdir -p "$DEST"
        cd "$DEST"

        fetch_tree() {
          local subpath="$1"
          local encoded_path
          encoded_path=$(printf '%s' "$subpath" | jq -Rr @uri)
          local tree
          tree=$(curl -fsS "${KNOT}/xrpc/sh.tangled.repo.tree?repo=${REPO_DID}&ref=${REF}&path=${encoded_path}")
          echo "$tree" | jq -r '.files[] | "\(.mode) \(.name)"' | while IFS=' ' read -r mode name; do
            local fullpath
            if [ -z "$subpath" ]; then
              fullpath="$name"
            else
              fullpath="${subpath}/${name}"
            fi
            if [ "$mode" = "0040000" ]; then
              fetch_tree "$fullpath"
            else
              mkdir -p "$(dirname "$fullpath")"
              local encoded_full
              encoded_full=$(printf '%s' "$fullpath" | jq -Rr @uri)
              curl -fsS \
                "${KNOT}/xrpc/sh.tangled.repo.blob?repo=${REPO_DID}&ref=${REF}&path=${encoded_full}&raw=true" \
                > "$fullpath"
            fi
          done
        }

        fetch_tree ""

        echo "Checked out ${REF} from ${KNOT}"
